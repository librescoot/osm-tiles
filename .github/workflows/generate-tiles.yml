name: Generate Custom Shortbread Tiles - Germany

permissions:
  contents: write

on:
  schedule:
    - cron: '0 5 3 * *'  # Monthly on the 3rd at 5 AM UTC
  workflow_dispatch:

jobs:
  generate_state_tiles:
    runs-on: self-hosted
    strategy:
      matrix:
        state:
          - { name: "baden-wuerttemberg", url: "https://download.geofabrik.de/europe/germany/baden-wuerttemberg-latest.osm.pbf" }
          - { name: "bayern", url: "https://download.geofabrik.de/europe/germany/bayern-latest.osm.pbf" }
          - { name: "bremen", url: "https://download.geofabrik.de/europe/germany/bremen-latest.osm.pbf" }
          - { name: "hamburg", url: "https://download.geofabrik.de/europe/germany/hamburg-latest.osm.pbf" }
          - { name: "hessen", url: "https://download.geofabrik.de/europe/germany/hessen-latest.osm.pbf" }
          - { name: "mecklenburg-vorpommern", url: "https://download.geofabrik.de/europe/germany/mecklenburg-vorpommern-latest.osm.pbf" }
          - { name: "niedersachsen", url: "https://download.geofabrik.de/europe/germany/niedersachsen-latest.osm.pbf" }
          - { name: "nordrhein-westfalen", url: "https://download.geofabrik.de/europe/germany/nordrhein-westfalen-latest.osm.pbf" }
          - { name: "rheinland-pfalz", url: "https://download.geofabrik.de/europe/germany/rheinland-pfalz-latest.osm.pbf" }
          - { name: "saarland", url: "https://download.geofabrik.de/europe/germany/saarland-latest.osm.pbf" }
          - { name: "sachsen", url: "https://download.geofabrik.de/europe/germany/sachsen-latest.osm.pbf" }
          - { name: "sachsen-anhalt", url: "https://download.geofabrik.de/europe/germany/sachsen-anhalt-latest.osm.pbf" }
          - { name: "schleswig-holstein", url: "https://download.geofabrik.de/europe/germany/schleswig-holstein-latest.osm.pbf" }
          - { name: "thueringen", url: "https://download.geofabrik.de/europe/germany/thueringen-latest.osm.pbf" }
    steps:
      - uses: actions/checkout@v4

      - name: Download OSM PBF for ${{ matrix.state.name }}
        run: |
          echo "Downloading ${{ matrix.state.name }} PBF file..."
          wget -q -O /tmp/${{ matrix.state.name }}.osm.pbf ${{ matrix.state.url }}
          echo "Download completed for ${{ matrix.state.name }}"
          ls -lh /tmp/${{ matrix.state.name }}.osm.pbf

      - name: Generate tiles for ${{ matrix.state.name }}
        run: |
          echo "Generating tiles for ${{ matrix.state.name }}..."
          mkdir -p /tmp/tilemaker-artifacts
          sudo docker run --rm \
            -v $(pwd):/var/tm \
            -v /tmp:/tmp \
            -w /var/tm \
            --entrypoint tilemaker \
            versatiles/versatiles-tilemaker \
              --config tilemaker/config.json \
              --process tilemaker/process.lua \
              --input /tmp/${{ matrix.state.name }}.osm.pbf \
              --output /tmp/tilemaker-artifacts/tiles_${{ matrix.state.name }}.mbtiles
          echo "Tile generation completed for ${{ matrix.state.name }}"
          ls -lh /tmp/tilemaker-artifacts/tiles_${{ matrix.state.name }}.mbtiles

      - name: Upload tiles for ${{ matrix.state.name }}
        uses: actions/upload-artifact@v4
        with:
          name: tiles_${{ matrix.state.name }}
          path: /tmp/tilemaker-artifacts/tiles_${{ matrix.state.name }}.mbtiles

  generate_berlin_brandenburg_tiles:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install osmium-tool
        run: sudo apt-get install -y osmium-tool

      - name: Download Berlin + Brandenburg PBF files
        run: |
          echo "Downloading Berlin PBF file..."
          wget -q -O /tmp/berlin.osm.pbf https://download.geofabrik.de/europe/germany/berlin-latest.osm.pbf
          echo "Downloading Brandenburg PBF file..."
          wget -q -O /tmp/brandenburg.osm.pbf https://download.geofabrik.de/europe/germany/brandenburg-latest.osm.pbf
          ls -lh /tmp/berlin.osm.pbf /tmp/brandenburg.osm.pbf

      - name: Merge Berlin + Brandenburg PBF files
        run: |
          echo "Merging Berlin and Brandenburg PBF files..."
          osmium merge /tmp/berlin.osm.pbf /tmp/brandenburg.osm.pbf -o /tmp/berlin_brandenburg.osm.pbf
          echo "Merge completed"
          ls -lh /tmp/berlin_brandenburg.osm.pbf

      - name: Generate tiles for berlin_brandenburg
        run: |
          echo "Generating tiles for berlin_brandenburg..."
          mkdir -p /tmp/tilemaker-artifacts
          sudo docker run --rm \
            -v $(pwd):/var/tm \
            -v /tmp:/tmp \
            -w /var/tm \
            --entrypoint tilemaker \
            versatiles/versatiles-tilemaker \
              --config tilemaker/config.json \
              --process tilemaker/process.lua \
              --input /tmp/berlin_brandenburg.osm.pbf \
              --output /tmp/tilemaker-artifacts/tiles_berlin_brandenburg.mbtiles
          echo "Tile generation completed for berlin_brandenburg"
          ls -lh /tmp/tilemaker-artifacts/tiles_berlin_brandenburg.mbtiles

      - name: Upload tiles for berlin_brandenburg
        uses: actions/upload-artifact@v4
        with:
          name: tiles_berlin_brandenburg
          path: /tmp/tilemaker-artifacts/tiles_berlin_brandenburg.mbtiles

  release:
    needs: [generate_state_tiles, generate_berlin_brandenburg_tiles]
    runs-on: self-hosted
    steps:
      - name: Download all tile artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: |
          echo "Listing all downloaded tile artifacts:"
          find artifacts -name "*.mbtiles" -type f -exec ls -lh {} \;

      - name: Set release month variable
        id: date
        run: echo "month=$(date '+%B %Y')" >> $GITHUB_OUTPUT

      - name: Create release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          automatic_release_tag: latest
          title: "Custom Shortbread Tiles - ${{ steps.date.outputs.month }}"
          files: |
            artifacts/**/*.mbtiles
